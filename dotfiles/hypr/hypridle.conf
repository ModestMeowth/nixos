general {
    lock_cmd = ~/.local/bin/system-lock
    before_sleep_cmd = LOCK_ONLY=true ~/.local/bin/system-lock
    after_sleep_cmd = sleep 1 && ~/.local/bin/system-wake
    inhibit_sleep = 3
}

listener {
    timeout = 300 # 5min
    on-timeout = pidof hyprlock || ~/.local/bin/launch-screensaver
}

listener {
    timeout = 302
    on-timeout = ~/.local/bin/system-lock
    on-resume = ~/.local/bin/system-wake
}
